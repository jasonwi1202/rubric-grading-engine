name: CI

on:
  pull_request:
    branches:
      - main
      - "release/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Backend: Ruff (fast — unblocks test jobs) ───────────────────────────────
  backend-ruff:
    name: Backend Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Ruff lint
        run: ruff check .
        working-directory: backend

      - name: Ruff format check
        run: ruff format --check .
        working-directory: backend

  # ─── Backend: mypy (slow — parallel, does not block tests) ───────────────────
  backend-mypy:
    name: Backend mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Cache mypy state
        uses: actions/cache@v4
        with:
          path: backend/.mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}-${{ github.sha }}
          restore-keys: |
            mypy-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}-
            mypy-${{ runner.os }}-

      - name: mypy type check
        run: |
          if [ -d "app" ]; then
            mypy
          else
            echo "app/ not yet created — skipping mypy"
          fi
        working-directory: backend

  # ─── Backend: Unit tests ──────────────────────────────────────────────────────
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: [backend-ruff]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Run unit tests with coverage
        run: |
          if [ -d "tests/unit" ]; then
            pytest tests/unit -m "not integration" \
              --cov=app --cov-report=term-missing --cov-fail-under=80 \
              -n auto -q
          else
            echo "tests/unit not yet created — skipping"
          fi
        working-directory: backend

  # ─── Backend: Integration tests ──────────────────────────────────────────────
  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-ruff]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Run integration tests
        run: |
          if [ -d "tests/integration" ]; then
            pytest tests/integration -m "integration" -q
          else
            echo "tests/integration not yet created — skipping"
          fi
        working-directory: backend

  # ─── Backend: Migration chain smoke test ───────────────────────────────────
  backend-migration-chain:
    name: Backend Migration Chain
    runs-on: ubuntu-latest
    needs: [backend-ruff]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from .env.ci
        run: cp .env.ci .env

      - name: Start postgres
        run: docker compose up -d postgres

      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U postgres > /dev/null 2>&1; then
              echo "Postgres ready"
              break
            fi
            echo "Waiting for postgres... ($i/30)"
            sleep 2
          done

      - name: Run migrations on fresh database
        run: |
          docker compose exec -T postgres psql -U postgres -d postgres -c "DROP DATABASE IF EXISTS migration_smoke"
          docker compose exec -T postgres psql -U postgres -d postgres -c "CREATE DATABASE migration_smoke"
          docker compose run --rm --no-deps \
            -e PYTHONPATH=/app \
            -e DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/migration_smoke \
            backend sh -c "cd /app && alembic upgrade head"

      - name: Assert migration head revision
        run: |
          current=$(docker compose exec -T postgres psql -U postgres -d migration_smoke -t -c \
            "SELECT version_num FROM alembic_version;" | tr -d '[:space:]')
          echo "Alembic version in DB: $current"
          if [ "$current" != "025_essay_versions_signals" ]; then
            echo "ERROR: expected '025_essay_versions_signals' but got '$current'"
            exit 1
          fi

      - name: Tear down services
        if: always()
        run: docker compose down -v

  # ─── Backend: Security audit ─────────────────────────────────────────────────
  backend-audit:
    name: Backend pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Audit dependencies (fail on any reported CVE)
        run: |
          # Temporary: pip package CVEs are currently unresolved upstream in
          # available releases on CI images. Keep project dependency auditing
          # strict while ignoring these toolchain-only findings.
          pip-audit --skip-editable --vulnerability-service pypi \
            --ignore-vuln CVE-2025-8869 \
            --ignore-vuln CVE-2026-1703 \
            --ignore-vuln CVE-2026-3219
        working-directory: backend

  # ─── Frontend: ESLint + TypeScript ───────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint + Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm ci
          else
            echo "package.json not yet created — skipping"
          fi
        working-directory: frontend

      - name: ESLint
        run: |
          if [ -f "package.json" ]; then
            npm run lint
          fi
        working-directory: frontend

      - name: TypeScript type check
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit
          fi
        working-directory: frontend

  # ─── Frontend: Vitest ─────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm ci
          fi
        working-directory: frontend

      - name: Run Vitest
        run: |
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test -- --run
          else
            echo "Vitest not yet configured — skipping"
          fi
        working-directory: frontend

  # ─── Frontend: npm audit ──────────────────────────────────────────────────────
  frontend-audit:
    name: Frontend npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm ci
          fi
        working-directory: frontend

      - name: npm audit (fail on high/critical CVEs)
        run: |
          if [ -f "package.json" ]; then
            npm audit --audit-level=high
          else
            echo "package.json not yet created — skipping"
          fi
        working-directory: frontend

  # ─── E2E: Playwright (release/* PRs and main only) ───────────────────────────
  # Skipped on feature branch PRs to keep the dev loop fast.  Runs on any PR
  # targeting main or release/* (i.e. milestone integration PRs).
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Only run on PRs targeting main or a release branch
    if: >
      github.event_name == 'pull_request' &&
      (github.base_ref == 'main' || startsWith(github.base_ref, 'release/'))
    needs: [backend-ruff, frontend-lint]
    env:
      E2E_BASE_URL: http://localhost:3000
      API_BASE_URL: http://localhost:8000
      MAILPIT_API_URL: http://localhost:8025
      E2E_SKIP_EMAIL_VERIFICATION: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Set up Python (for smoke test + health checks)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create .env from .env.ci
        run: cp .env.ci .env

      - name: Start infrastructure services
        run: docker compose up -d postgres redis minio minio-init mailpit
        timeout-minutes: 2

      - name: Wait for infrastructure to be healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U postgres > /dev/null 2>&1 && \
               docker compose exec -T redis redis-cli ping > /dev/null 2>&1; then
              echo "Infrastructure ready"
              break
            fi
            echo "Waiting for infrastructure... ($i/30)"
            sleep 3
          done

      - name: Run database migrations
        run: |
          docker compose run --rm \
            --no-deps \
            -e PYTHONPATH=/app \
            backend sh -c "cd /app && alembic upgrade head"

      - name: Start Docker Compose stack
        run: docker compose up -d backend worker frontend
        timeout-minutes: 5

      - name: Wait for all services to be healthy
        run: |
          python scripts/smoke_test.py \
            --api-url http://localhost:8000 \
            --frontend-url http://localhost:3000 \
            --mailpit-url http://localhost:8025 \
            --retries 10 \
            --retry-delay 3

      - name: Wait for Celery worker to be ready
        run: |
          # Give the worker time to connect to Redis and register tasks.
          # Without this, the first signup email task can sit in the queue
          # for several seconds before the worker picks it up, causing
          # waitForEmail() to time out in Playwright tests.
          for i in $(seq 1 20); do
            if docker compose exec -T worker celery -A app.tasks.celery_app inspect ping --timeout 3 > /dev/null 2>&1; then
              echo "Celery worker is ready"
              break
            fi
            echo "Waiting for worker... ($i/20)"
            sleep 3
          done

      - name: Run Playwright E2E tests
        run: npx playwright test
        working-directory: frontend

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose down -v



