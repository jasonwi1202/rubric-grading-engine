name: CI

on:
  pull_request:
    branches:
      - main
      - "release/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Backend: Ruff (fast — unblocks test jobs) ───────────────────────────────
  backend-ruff:
    name: Backend Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Ruff lint
        run: ruff check .
        working-directory: backend

      - name: Ruff format check
        run: ruff format --check .
        working-directory: backend

  # ─── Backend: mypy (slow — parallel, does not block tests) ───────────────────
  backend-mypy:
    name: Backend mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Cache mypy state
        uses: actions/cache@v4
        with:
          path: backend/.mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}-${{ github.sha }}
          restore-keys: |
            mypy-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}-
            mypy-${{ runner.os }}-

      - name: mypy type check
        run: |
          if [ -d "app" ]; then
            mypy
          else
            echo "app/ not yet created — skipping mypy"
          fi
        working-directory: backend

  # ─── Backend: Unit tests ──────────────────────────────────────────────────────
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: [backend-ruff]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Run unit tests with coverage
        run: |
          if [ -d "tests/unit" ]; then
            pytest tests/unit -m "not integration" \
              --cov=app --cov-report=term-missing --cov-fail-under=80 \
              -n auto -q
          else
            echo "tests/unit not yet created — skipping"
          fi
        working-directory: backend

  # ─── Backend: Integration tests ──────────────────────────────────────────────
  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-ruff]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Run integration tests
        run: |
          if [ -d "tests/integration" ]; then
            pytest tests/integration -m "integration" -q
          else
            echo "tests/integration not yet created — skipping"
          fi
        working-directory: backend

  # ─── Backend: Security audit ─────────────────────────────────────────────────
  backend-audit:
    name: Backend pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: |
          if [ -f "pyproject.toml" ]; then
            pip-audit --requirement <(pip install -e ".[dev]" --dry-run 2>&1 | grep "^  " | awk '{print $1}') || true
          else
            echo "pyproject.toml not yet created — skipping"
          fi
        working-directory: backend

  # ─── Frontend: ESLint + TypeScript ───────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint + Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm ci
          else
            echo "package.json not yet created — skipping"
          fi
        working-directory: frontend

      - name: ESLint
        run: |
          if [ -f "package.json" ]; then
            npm run lint
          fi
        working-directory: frontend

      - name: TypeScript type check
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit
          fi
        working-directory: frontend

  # ─── Frontend: Vitest ─────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm ci
          fi
        working-directory: frontend

      - name: Run Vitest
        run: |
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test -- --run
          else
            echo "Vitest not yet configured — skipping"
          fi
        working-directory: frontend

  # ─── Frontend: npm audit ──────────────────────────────────────────────────────
  frontend-audit:
    name: Frontend npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm ci
          fi
        working-directory: frontend

      - name: npm audit
        run: |
          if [ -f "package.json" ]; then
            npm audit --audit-level=critical
          else
            echo "package.json not yet created — skipping"
          fi
        working-directory: frontend
