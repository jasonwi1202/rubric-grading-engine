name: Bug Report
description: Report a bug or unexpected behavior
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: "Please provide enough detail to reproduce the issue."

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages (without student data).
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the system is affected?
      options:
        - Grading / LLM
        - Essay upload / ingestion
        - Teacher review interface
        - Rubric builder
        - Export
        - Authentication
        - Student profiles
        - Batch progress / Celery
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, logs (no student data), or screenshots.
    validations:
      required: false
