# =============================================================================
# GradeWise — Demo Compose file
#
# Starts the full stack with pre-seeded demo data using fixed demo credentials.
# This is NOT for development or production.  Everything here runs on a single
# machine with no external dependencies.
#
# Usage:
#   cp .env.demo .env.demo.local   # copy template (first time only)
#   docker compose -f docker-compose.demo.yml up -d
#   python scripts/smoke_test_demo.py
#   open http://localhost:3000
#
# Demo accounts created by the seed script:
#   Teacher  — demo@gradewise.app / DemoPass123!
#
# Service URLs:
#   Frontend        http://localhost:3000
#   API             http://localhost:8000/docs
#   Mailpit web UI  http://localhost:8025  (catches all outbound email)
#   MinIO console   http://localhost:9001  (minioadmin / minioadmin)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rubric_grading
    ports:
      - "5432:5432"
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - demo_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible object storage)
  # Console: http://localhost:9001  (minioadmin / minioadmin)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - demo_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # MinIO bucket initializer (one-shot)
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/rubric-grading-local &&
        echo 'Bucket ready.'
      "

  # ---------------------------------------------------------------------------
  # Mailpit — catches all outbound emails locally
  # Web UI:  http://localhost:8025
  # SMTP:    localhost:1025  (no auth)
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/rubric_grading
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: demo-jwt-secret-key-do-not-use-in-production-32ch
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      EMAIL_VERIFICATION_HMAC_SECRET: demo-hmac-secret-key-not-for-production-32ch
      UNSUBSCRIBE_HMAC_SECRET: demo-unsubscribe-secret-not-for-production-32c
      VERIFICATION_TOKEN_TTL_SECONDS: 86400
      FRONTEND_URL: http://localhost:3000
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      SMTP_FROM_EMAIL: noreply@demo.gradewise.app
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-demo-key-not-set}
      OPENAI_GRADING_MODEL: gpt-4o
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      LLM_REQUEST_TIMEOUT_SECONDS: "60"
      LLM_MAX_RETRIES: "3"
      GRADING_PROMPT_VERSION: v1
      S3_BUCKET_NAME: rubric-grading-local
      S3_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT_URL: http://minio:9000
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      CORS_ORIGINS: http://localhost:3000
      MAX_ESSAY_FILE_SIZE_MB: "10"
      CELERY_WORKER_CONCURRENCY: "2"
      GRADING_TASK_SOFT_TIME_LIMIT: "120"
      GRADING_TASK_HARD_TIME_LIMIT: "180"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ---------------------------------------------------------------------------
  # Database migration + demo seed (runs once after backend is healthy)
  # ---------------------------------------------------------------------------
  demo-seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "
        echo 'Running migrations...' &&
        PYTHONPATH=/app alembic upgrade head &&
        echo 'Migrations complete.'
      "
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/rubric_grading
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: demo-jwt-secret-key-do-not-use-in-production-32ch
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      EMAIL_VERIFICATION_HMAC_SECRET: demo-hmac-secret-key-not-for-production-32ch
      UNSUBSCRIBE_HMAC_SECRET: demo-unsubscribe-secret-not-for-production-32c
      VERIFICATION_TOKEN_TTL_SECONDS: 86400
      FRONTEND_URL: http://localhost:3000
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      SMTP_FROM_EMAIL: noreply@demo.gradewise.app
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-demo-key-not-set}
      OPENAI_GRADING_MODEL: gpt-4o
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      LLM_REQUEST_TIMEOUT_SECONDS: "60"
      LLM_MAX_RETRIES: "3"
      GRADING_PROMPT_VERSION: v1
      S3_BUCKET_NAME: rubric-grading-local
      S3_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT_URL: http://minio:9000
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      CORS_ORIGINS: http://localhost:3000
      MAX_ESSAY_FILE_SIZE_MB: "10"
      CELERY_WORKER_CONCURRENCY: "2"
      GRADING_TASK_SOFT_TIME_LIMIT: "120"
      GRADING_TASK_HARD_TIME_LIMIT: "180"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/rubric_grading
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: demo-jwt-secret-key-do-not-use-in-production-32ch
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      EMAIL_VERIFICATION_HMAC_SECRET: demo-hmac-secret-key-not-for-production-32ch
      UNSUBSCRIBE_HMAC_SECRET: demo-unsubscribe-secret-not-for-production-32c
      VERIFICATION_TOKEN_TTL_SECONDS: 86400
      FRONTEND_URL: http://localhost:3000
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      SMTP_FROM_EMAIL: noreply@demo.gradewise.app
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-demo-key-not-set}
      OPENAI_GRADING_MODEL: gpt-4o
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      LLM_REQUEST_TIMEOUT_SECONDS: "60"
      LLM_MAX_RETRIES: "3"
      GRADING_PROMPT_VERSION: v1
      S3_BUCKET_NAME: rubric-grading-local
      S3_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT_URL: http://minio:9000
      ENVIRONMENT: development
      LOG_LEVEL: WARNING
      CORS_ORIGINS: http://localhost:3000
      MAX_ESSAY_FILE_SIZE_MB: "10"
      CELERY_WORKER_CONCURRENCY: "2"
      GRADING_TASK_SOFT_TIME_LIMIT: "120"
      GRADING_TASK_HARD_TIME_LIMIT: "180"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Next.js Frontend (production build for demo — faster, no hot-reload)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_ENV: development
    depends_on:
      backend:
        condition: service_healthy

volumes:
  demo_postgres_data:
  demo_redis_data:
  demo_minio_data:
