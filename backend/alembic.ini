# ---------------------------------------------------------------------------
# Alembic configuration
# ---------------------------------------------------------------------------
# This file is read by the `alembic` CLI.  The actual database URL is read
# from the application settings at runtime (see app/db/migrations/env.py),
# so the sqlalchemy.url placeholder below is never used directly.
# ---------------------------------------------------------------------------

[alembic]
# Path to the migration scripts, relative to this file.
script_location = app/db/migrations

# Template used when generating new migration files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for the %%(year)s/%%(month)s/%%(day)s tokens above.
timezone = UTC

# Maximum length of the slug portion of the filename.
truncate_slug_length = 40

# Allow autogenerated revisions to be detected more reliably.
revision_environment = false

# Emit `CREATE INDEX CONCURRENTLY` inside a separate transaction block.
# Individual migrations that need this set it explicitly via
# `transaction_per_migration = False` in env.py.
output_encoding = utf-8

# Database URL — overridden at runtime from app.config.settings.database_url.
# This value is only a fallback; do not change it to a real connection string.
sqlalchemy.url = postgresql+asyncpg://

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
